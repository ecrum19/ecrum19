<svg xmlns="http://www.w3.org/2000/svg" width="130" height="20" viewBox="0 0 130 20" role="img" aria-label="personal website">
  <title>personal website</title>
  <linearGradient id="smooth" x2="0" y2="100%">
    <stop offset="0" stop-color="#bbb" stop-opacity=".1"/>
    <stop offset="1" stop-opacity=".1"/>
  </linearGradient>
  <clipPath id="round">
    <rect width="130" height="20" rx="3" fill="#fff"/>
  </clipPath>
  <g clip-path="url(#round)">
    <rect width="24" height="20" fill="#555"/>
    <rect x="24" width="106" height="20" fill="#000"/>
    <rect width="130" height="20" fill="url(#smooth)"/>
  </g>
  <image x="5" y="3" width="14" height="14" preserveAspectRatio="xMidYMid meet"
    href="data:image/svg+xml;base64,"/>
  <g fill="#fff" text-anchor="middle" font-family="Verdana,DejaVu Sans,sans-serif" text-rendering="geometricPrecision" font-size="110">
    <text x="760" y="150" fill="#010101" fill-opacity=".3" transform="scale(.1)" aria-hidden="true">personal website</text>
    <text x="760" y="140" transform="scale(.1)">personal website</text>
  </g>
</svg>
